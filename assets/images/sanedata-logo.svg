<svg viewBox="0 55 800 200" xmlns="http://www.w3.org/2000/svg">
  <title>SaneData - Logomarca Oficial</title>
  <desc>Marca visual para SaneData: plataforma inteligente de priorização de investimentos em saneamento</desc>

  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1F7D3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d4620;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="55" width="800" height="200" fill="#FFFFFF"/>

  <!-- Left section: Logo mark -->
  <g id="logoMark">
    <!-- Main water drop shape with gradient -->
    <path d="M 160 80 Q 140 110 140 140 Q 140 190 180 220 Q 220 190 220 140 Q 220 110 200 80 Q 180 70 160 70 Q 140 70 160 80 Z"
          fill="url(#waterGradient)" stroke="#1F7D3E" stroke-width="2" stroke-linejoin="round"/>

    <!-- Inner highlight - water clarity -->
    <ellipse cx="165" cy="120" rx="20" ry="30" fill="#D4AF37" opacity="0.25"/>

    <!-- Data flow lines - flowing upward through drop -->
    <path d="M 160 150 Q 155 130 160 110" stroke="#D4AF37" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 175 155 Q 180 135 175 115" stroke="#D4AF37" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- Health/wellness symbol - integrated cross -->
    <g transform="translate(160, 140)">
      <rect x="-3" y="-12" width="6" height="24" fill="#D4AF37" opacity="0.6"/>
      <rect x="-12" y="-3" width="24" height="6" fill="#D4AF37" opacity="0.6"/>
    </g>

    <!-- Circular arc - sustainable cycle -->
    <path d="M 140 180 Q 180 200 220 180" stroke="#D4AF37" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Data nodes - representing municipalities -->
    <circle cx="120" cy="160" r="3" fill="#D4AF37"/>
    <circle cx="200" cy="160" r="3" fill="#D4AF37"/>
    <circle cx="160" cy="240" r="3" fill="#D4AF37"/>

    <!-- Network connections -->
    <line x1="140" y1="180" x2="120" y2="160" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
    <line x1="180" y1="200" x2="200" y2="160" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
    <line x1="180" y1="220" x2="160" y2="240" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Right section: Text and branding -->
  <g id="textLogo">
    <!-- Main logotype -->
    <text x="340" y="160" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#1F7D3E" letter-spacing="1" text-anchor="start">
      SaneData
    </text>

    <!-- Tagline -->
    <text x="340" y="200" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#555555" letter-spacing="0.5" text-anchor="start">
      Inteligência em Saneamento
    </text>

    <!-- Decorative accent line -->
    <rect x="340" y="215" width="320" height="2" fill="#D4AF37"/>

    <!-- Descriptor -->
    <text x="340" y="245" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#777777" letter-spacing="0.3" text-anchor="start">
      Priorização espacial de investimentos em saneamento básico
    </text>
  </g>
</svg>
